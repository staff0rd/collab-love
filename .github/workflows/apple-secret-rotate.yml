name: Rotate Apple client secret

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 1 * *"

jobs:
  rotate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Mint and push the Apple client secret
        env:
          APPLE_SIGNIN_KEY: ${{ secrets.APPLE_SIGNIN_KEY }}
          APPLE_KEY_ID: ${{ secrets.APPLE_KEY_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
        run: |
          set -euo pipefail

          secret="$(node scripts/apple-secret.mjs)"
          echo "::add-mask::$secret"

          ref="${SUPABASE_URL#https://}"
          ref="${ref%%.supabase.co*}"
          if [ -z "$ref" ] || [ "$ref" = "$SUPABASE_URL" ]; then
            echo "Could not derive the project ref from SUPABASE_URL ('$SUPABASE_URL')." >&2
            exit 1
          fi
          echo "Pushing a fresh Apple client secret to project $ref"

          status="$(curl -sS -o response.json -w '%{http_code}' \
            -X PATCH "https://api.supabase.com/v1/projects/$ref/config/auth" \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            --data "$(jq -n --arg s "$secret" '{external_apple_secret: $s}')")"

          echo "Management API responded with HTTP $status"
          if [ "$status" != "200" ]; then
            cat response.json >&2
            exit 1
          fi
