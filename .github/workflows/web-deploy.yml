name: Deploy
run-name: Deploy · iOS build ${{ github.run_number }}

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}

      - name: Verify the build boots
        run: node scripts/boot-check.mjs --dist dist

      - name: Deploy to Netlify
        run: npx netlify-cli deploy --no-build --dir=dist --prod -s ${{ vars.NETLIFY_SITE_ID }} --auth ${{ secrets.NETLIFY_AUTH_TOKEN }} --message "Deployed commit ${{ github.sha }}"

  testflight:
    needs: deploy-web
    environment: testflight
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app and sync to iOS
        run: |
          npm run build
          npx cap sync ios
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: ios

      - name: Write App Store Connect API key
        run: echo "$ASC_KEY_CONTENT" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"
        env:
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}

      - name: Build and upload to TestFlight
        working-directory: ios
        run: bundle exec fastlane beta
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          ASC_KEY_PATH: ${{ runner.temp }}/AuthKey.p8
          BUILD_NUMBER: ${{ github.run_number }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}

      - name: Summarize uploaded build
        working-directory: ios
        run: |
          version=$(grep -m1 MARKETING_VERSION App/App.xcodeproj/project.pbxproj | sed 's/.*= //; s/;//')
          echo "### 📦 Uploaded to TestFlight: $version ($BUILD_NUMBER)" >> "$GITHUB_STEP_SUMMARY"
        env:
          BUILD_NUMBER: ${{ github.run_number }}
